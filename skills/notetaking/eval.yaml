name: notetaking-eval
description: Evaluate the notetaking skill's transformation of raw notes into polished PatternFly 6 HTML reports
skill: notetaking

execution:
  mode: case
  arguments: "{prompt}"
  timeout: 900

runner:
  type: claude-code

models:
  skill: claude-sonnet-4-6
  judge: claude-sonnet-4-6

permissions:
  allow:
    - "Write(/Users/ejaquez/Desktop/Notes Export/**)"
    - "Write(/Users/ejaquez/Desktop/Notes Export/originals/**)"
    - "Read(/Users/ejaquez/.claude/skills/notetaking/**)"
    - "Read(/Users/ejaquez/Projects/cursor-skills/skills/notetaking/**)"
    - "Bash(mkdir *)"
    - "Bash(ls *)"
  deny: []

mlflow:
  experiment: notetaking-eval

dataset:
  path: eval/cases
  schema: |
    Each case directory contains:
    - input.yaml: YAML file with fields:
      - 'prompt': The raw notes text or instructions to process.
      - 'content_type' (optional): Hint — meeting, research, github, learning, raw.
    - annotations.yaml: Test metadata for annotation-aware judges.

outputs:
  - path: output
    schema: |
      The skill writes HTML to ~/Desktop/Notes Export/.

      FOR JUDGES: The HTML content is inside the events data, specifically in
      assistant events where tools[].name == "Write" and the path ends in .html.
      Access via outputs.get("events", []) — NOT via env vars or file reads.

      Check judges should iterate outputs["events"] to find Write tool calls.
      LLM judges receive {{ conversation }} which may contain the HTML if the
      harness includes tool call content. If not visible, instruct judges to
      check for evidence of HTML generation in process narration.

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

judges:
  - name: budget_check
    builtin: cost_budget
    arguments:
      max_cost_usd: 5.0

  - name: html_produced
    description: |
      Verify the skill created an HTML file by checking events for Write tool
      calls containing HTML content.
    check: |
      events = outputs.get("events", [])
      conv = outputs.get("conversation", "")

      for e in events:
          if not isinstance(e, dict):
              continue
          if e.get("type") == "assistant" and e.get("tools"):
              for t in e["tools"]:
                  if t.get("name") == "Write":
                      inp = t.get("input", {})
                      path = inp.get("file_path", "") or inp.get("path", "")
                      content = inp.get("content", "")
                      if ".html" in path and "<!DOCTYPE" in content:
                          return (True, f"HTML written to {path} ({len(content)} chars)")

          if e.get("type") == "tool_result" and e.get("tool_name") == "Write":
              content_str = str(e.get("content", ""))
              if "Wrote" in content_str and ".html" in content_str:
                  return (True, f"Write confirmed: {content_str[:100]}")

      if "<!DOCTYPE" in conv or "<!doctype" in conv:
          return (True, "HTML content found in conversation")
      if ".html" in conv.lower() and ("notes export" in conv.lower() or "desktop" in conv.lower()):
          return (True, "HTML file referenced in conversation")

      return (False, "No HTML output found in events or conversation")

  - name: voice_and_tone
    description: |
      Verify neutral third-person voice. Extracts HTML from events if possible.
    check: |
      html = ""
      events = outputs.get("events", [])
      for e in events:
          if not isinstance(e, dict):
              continue
          if e.get("type") == "assistant" and e.get("tools"):
              for t in e["tools"]:
                  if t.get("name") == "Write":
                      content = t.get("input", {}).get("content", "")
                      if "<!DOCTYPE" in content and len(content) > len(html):
                          html = content

      text = html if html else outputs.get("conversation", "")
      if not text:
          return (False, "No output to check")

      issues = []
      bad = ["I found", "I recommend", "My recommendation", "I think", "I'd suggest", "I noticed", "I want"]
      for phrase in bad:
          if phrase.lower() in text.lower():
              issues.append(f"'{phrase}'")
      if len(issues) > 2:
          return (False, f"Voice issues: {'; '.join(issues[:5])}")
      return (True, f"Voice check passed ({len(issues)} minor issues)")

  - name: summary_quality
    description: |
      Evaluate summary quality. Judge should look for HTML content in
      Write tool calls within the conversation.
    prompt: |
      Evaluate the summary in the notetaking skill output below.

      IMPORTANT: The actual HTML report may appear as content within a Write
      tool call. Look for <!DOCTYPE html> content — that is the output.
      If you see HTML, find the summary callout (border-left element near the
      top with bold text). If no HTML is visible, check process narration for
      summary text the skill described generating.

      {{ conversation }}

      Criteria:
      1. Answers "What should someone do differently?"
      2. Leads with bold conclusion
      3. Includes key number/result if available
      4. 2-3 sentences, no hedging
      5. Third-person voice
      6. Never starts with "This note covers..." or "We discussed..."

      Score 1-5:
      1: Missing or not visible
      2: Exists but vague/wrong tone
      3: Correct voice, lacks bold lead or data
      4: Good — bold lead, specific, minor issues
      5: Excellent — bold conclusion, key data, concise, no hedging

  - name: content_quality
    description: |
      Evaluate overall quality of the HTML output.
    prompt: |
      Evaluate this notetaking skill output.

      IMPORTANT: The HTML report may appear within a Write tool call. Look
      for <!DOCTYPE html> content. If you find it, evaluate that HTML
      directly. If not visible, assess from any process narration about
      what was generated.

      {{ conversation }}

      Dimensions:
      1. Content preservation — decisions, data, actions preserved
      2. Filler removal — transcript artifacts cut
      3. Professional tone — third-person documentation voice
      4. Design — Red Hat colors (red accents only, no teal/blue flooding),
         readable contrast, responsive layout
      5. Structure — logical sections, tables/lists where appropriate,
         tags present, hat watermark, github.com/ejaquez footer

      Score 1-5:
      1: No output or major failures
      2: Some content but gaps or design violations
      3: Mostly preserved, adequate design
      4: All content, professional, good design
      5: Comprehensive, impeccable, all required elements

thresholds:
  budget_check:
    min_pass_rate: 1.0
  html_produced:
    min_pass_rate: 1.0
  voice_and_tone:
    min_pass_rate: 0.8
  summary_quality:
    min_mean: 3.5
  content_quality:
    min_mean: 3.5
